<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="robots" content="noindex, nofollow" />

        <title>Flash Player</title>

        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

        <style>
            html, body {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                overflow: hidden;
            }
        </style>
    </head>
    <body>
        <script>
            window.RufflePlayer = window.RufflePlayer || {};
            window.RufflePlayer.config = {
                ...window.RufflePlayer.config, // Merge with any existing config, such as the user's extension config. Options you set below will have priority.

                "letterbox": "on",
                "showSwfDownload": true,
            };
        </script>

        <script src="ruffle/ruffle.js"></script>

        <script>
            function clean(name) {
                return name.replace(/[^a-zA-Z0-9]/g, "").toLowerCase();
            }

            function loadGame(games, player) {
                const flashName = location.search.split("?")[1];
                const isGame = games.find((game) => clean(game.gameName) == flashName);

                if (isGame) {
                    player.ruffle().load("flash/" + flashName + ".swf");
                }
            }

            (async function init() {
                // Fetch games
                const gamesURL = await fetch("list_games.json");
                const games = await gamesURL.json();

                // Create Ruffle player
                let ruffle = window.RufflePlayer.newest();
                let player = ruffle.createPlayer();

                player.style.width = "100vw";
                player.style.height = "100vh";
                document.body.appendChild(player);

                // LOAD THAT ISH !!!!!!
                loadGame(games, player);
            })();
        </script>
    </body>
</html>
